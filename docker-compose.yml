services:

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    networks:
      - app
    environment:
      POSTGRES_DB: exopy
      POSTGRES_USER: exopy
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U exopy -d exopy -p 5432 -h localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./serveur
    restart: unless-stopped
    networks:
      - app
    environment:
      DATABASE_URL: postgresql://exopy:${POSTGRES_PASSWORD}@postgres:5432/exopy
      SECRET_KEY: ${SECRET_KEY}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      CORS_ORIGINS: ${CORS_ORIGINS:-}
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./client
    restart: unless-stopped
    networks:
      - app
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:80/"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  postgres_data:

networks:
  app:
